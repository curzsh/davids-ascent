plugins {
    id 'java'
    id 'application'
}

group = 'com.davidsascent'
version = '0.1.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'io.github.tehnewb:Valthorne:1.3.0'
    testImplementation 'org.junit.jupiter:junit-jupiter:5.11.0'
}

test {
    useJUnitPlatform()
}

sourceSets {
    main {
        resources {
            srcDirs 'assets'
        }
    }
}

application {
    mainClass = 'com.davidsascent.Game'
}

jar {
    manifest {
        attributes 'Main-Class': 'com.davidsascent.Game'
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
}
